[project]
name = "ikfastpy"
version = "0.0.0"
description = "Standalone Python implementation of the IKFast analytic inverse kinematics solver."
readme = "README.md"
license = { text = "LGPL-3.0-or-later" }
requires-python = ">=3.10"
authors = [{ name = "Siddhartha Srinivasa" }]
keywords = ["robotics", "inverse-kinematics", "ikfast", "kinematics"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Lesser General Public License v3 or later (LGPLv3+)",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=1.24",
    "sympy",  # version pin TBD in M1 (#6)
    "yourdfpy>=0.0.50",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff",
    "mypy",
]

[project.urls]
Repository = "https://github.com/siddhss5/ikfastpy"
Issues = "https://github.com/siddhss5/ikfastpy/issues"

# Build system left intentionally unset until M3 (#10) wires up scikit-build-core + cmake.
[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
