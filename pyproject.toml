[build-system]
requires = ["hatchling>=1.27", "hatch-vcs>=0.4"]
build-backend = "hatchling.build"

[project]
name = "ssik"
description = "Pluggable analytical inverse-kinematics library for Python."
readme = "README.md"
license = { text = "LGPL-3.0-or-later" }
requires-python = ">=3.11"
authors = [{ name = "Siddhartha Srinivasa" }]
keywords = ["robotics", "inverse-kinematics", "ikfast", "ik-geo", "kinematics"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Lesser General Public License v3 or later (LGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=2.0",
    "sympy>=1.10",
]
dynamic = ["version"]

# Optional feature extras. Users opt in per feature; the core wheel stays light.
[project.optional-dependencies]
urdf = [
    "urchin>=0.0.27",
]

[project.urls]
Repository = "https://github.com/siddhss5/ikfastpy"
Issues = "https://github.com/siddhss5/ikfastpy/issues"

# PEP 735 dependency groups — for tooling that's not an "extra" of the package.
[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.8",
    "mypy>=1.13",
    "urchin>=0.0.27",  # exercised by the URDF-adapter tests
]
docs = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "pymdown-extensions>=10.12",
]

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/ssik/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/ssik"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]
extend-exclude = ["src/ssik/_vendor"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "B",        # bugbear
    "UP",       # pyupgrade
    "RUF",      # ruff-specific
    "SIM",      # simplify
    "PT",       # pytest style
]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src", "tests"]
exclude = ["src/ssik/_vendor/"]

# Vendored modules are not type-checked. Treat anything imported from them
# as Any in our typed code so strict mode doesn't flag every call site.
[[tool.mypy.overrides]]
module = "ssik._vendor.*"
follow_imports = "skip"
follow_imports_for_stubs = true

# sympy ships no type stubs and is only used inside tests (for roundtrip
# correctness checks against the vendored generator).
[[tool.mypy.overrides]]
module = "sympy.*"
ignore_missing_imports = true

# urchin (URDF parser) ships no type stubs.
[[tool.mypy.overrides]]
module = "urchin.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "-m", "not slow"]
markers = [
    "slow: symbolic IK generation tests that run on the order of seconds to minutes; opt in with `-m slow`",
]
filterwarnings = [
    # Upstream ikfast.py uses unraw regex literals like '\d', '\g'. They render
    # correctly at runtime but emit SyntaxWarning on Python 3.12+. Out of scope
    # to fix in vendored code; would resurface on every upstream re-pin.
    "ignore::SyntaxWarning:ssik._vendor",
    "ignore::SyntaxWarning:ssik",
]
